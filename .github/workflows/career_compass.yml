name: Career Compass Weekly Run

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00
  workflow_dispatch: # Allow manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python run.py

      - name: Commit changes
        run: |
          git config --global user.name "Career Compass Bot"
          git config --global user.email "bot@careercompass.ai"
          git add data/ outputs/ dashboard/data.js
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Career Compass Run [skip ci]"
          git push

      - name: Get latest email file
        id: get_email
        run: echo "FILE_PATH=$(ls outputs/email_*.md | tail -n 1)" >> $GITHUB_ENV

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: Career Compass - Tu Reporte Semanal
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Career Compass Agent
          body: file://${{ env.FILE_PATH }}

name: Career Compass Weekly Run

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: python run.py

      - name: Commit changes
        run: |
          git config --global user.name "Career Compass Bot"
          git config --global user.email "bot@careercompass.ai"
          mkdir -p data/runs outputs
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Career Compass Run [skip ci]"
          git push || echo "Nothing new to push."

      - name: Get latest email file
        id: get_email
        run: |
          LATEST_FILE=$(ls -t outputs/email_*.md 2>/dev/null | head -n 1)
          if [ -z "$LATEST_FILE" ]; then
            echo "[-] Error: No se encontró ningún archivo de email en la carpeta outputs."
            exit 1
          fi
          echo "FILE_PATH=$LATEST_FILE" >> $GITHUB_ENV

      - name: Convert Markdown to HTML
        run: |
          pip install markdown
          python -c "import markdown; import os; content = open(os.environ['FILE_PATH']).read(); html = markdown.markdown(content); open('outputs/email.html', 'w').write(html)"

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: Career Compass - Tu Reporte Semanal
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Career Compass Agent
          html_body: file://outputs/email.html
